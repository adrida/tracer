name: Surrogate model proposal
description: Propose adding a new surrogate model to the zoo. Benchmark required.
labels: ["model-proposal", "needs-benchmark", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a model. We're glad to grow the zoo when a model
        earns its place on the coverage-vs-agreement frontier, and a reproducible
        benchmark against the existing zoo is what lets us tell. Without one we'll
        usually ask for the numbers before we can move forward (see
        CONTRIBUTING.md). It's quick to run, and we're happy to help.
  - type: input
    id: model
    attributes:
      label: Model
      description: Which model, and its scikit-learn compatible implementation.
    validations:
      required: true
  - type: textarea
    id: benchmark
    attributes:
      label: Benchmark vs the existing zoo
      description: >
        Coverage at the target teacher agreement, and realized agreement on a
        held-out split, for your model versus the current zoo on main. Use a
        public dataset (or the repo fixtures) and a fixed seed.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Reproduction command and config
      description: The exact command, dataset, and seed a maintainer can run to reproduce your numbers.
      render: shell
    validations:
      required: true
  - type: input
    id: dependency
    attributes:
      label: New dependency cost
      description: Any new dependency this adds, its size, and whether it can be optional.
    validations:
      required: false
